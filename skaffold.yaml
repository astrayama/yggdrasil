apiVersion: skaffold/v4beta5
kind: Config
metadata:
  name: yggdrasil

build:
  artifacts:
    - image: us-docker.pkg.dev/yggdrasil-shared/docker/yggdrasil-web
      context: .
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: ".next/static/**"
            dest: ".next/static/"
  local:
    push: true
  platforms:
    - linux/amd64

deploy:
  cloudrun:
    projectid: "{{.PROJECT_ID}}"
    region: us-central1
    service: yggdrasil-web
    manifests:
      - path: cloudrun-service.yaml

profiles:
  - name: dev
    activation:
      - env: TARGET=dev
    deploy:
      cloudrun:
        projectid: yggdrasil-dev
    patches:
      - op: replace
        path: /deploy/cloudrun/service
        value: yggdrasil-web-dev

  - name: prod
    activation:
      - env: TARGET=prod
    deploy:
      cloudrun:
        projectid: yggdrasil-prod
    patches:
      - op: replace
        path: /deploy/cloudrun/service
        value: yggdrasil-web-prod

---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: yggdrasil-web
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
    run.googleapis.com/cpu-throttling: "false"
    run.googleapis.com/startup-cpu-boost: "true"
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/memory: "2Gi"
        run.googleapis.com/cpu: "2"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "100"
    spec:
      serviceAccountName: yggdrasil-web@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: us-docker.pkg.dev/yggdrasil-shared/docker/yggdrasil-web
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: stripe-secret
              mountPath: /secrets/stripe
              readOnly: true
            - name: vertex-ai-secret
              mountPath: /secrets/vertex
              readOnly: true
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: stripe-secret
          secret:
            secretName: stripe-secret-key
            items:
              - key: latest
                path: stripe-secret-key
        - name: vertex-ai-secret
          secret:
            secretName: vertex-ai-api-key
            items:
              - key: latest
                path: vertex-ai-api-key
  traffic:
    - revisionName: ""
      percent: 100
      latestRevision: true
