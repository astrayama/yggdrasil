name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.github/workflows/terraform.yml'
      - 'terraform/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'terraform/**'

env:
  NODE_VERSION: '20'
  REGION: 'us-central1'
  SHARED_PROJECT: 'yggdrasil-shared'
  ARTIFACT_REGISTRY: 'us-docker.pkg.dev/yggdrasil-shared/docker'
  SERVICE_NAME: 'yggdrasil-web'

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint root
        run: npm run lint

      - name: Lint functions
        run: cd functions && npm run lint

      - name: Type check root
        run: npm run type-check

      - name: Build functions (type check)
        run: cd functions && npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Run root tests
        run: npm run test --if-present -- --passWithNoTests --ci --maxWorkers=2

      - name: Run functions tests
        run: cd functions && npm run test --if-present -- --passWithNoTests --ci --maxWorkers=2

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Run npm audit (root)
        run: npm audit --audit-level=high --json > npm-audit-root.json || true

      - name: Run npm audit (functions)
        run: cd functions && npm audit --audit-level=high --json > ../npm-audit-functions.json || true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  build-and-sign:
    name: Build, Sign & Push
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, security-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.build.outputs.tag }}
      release-name: ${{ steps.deploy.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_DEPLOYER_SA }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build and push container
        id: build
        uses: google-github-actions/cloud-build@v2
        with:
          name: us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }}
          dir: .
          project: ${{ env.SHARED_PROJECT }}
          region: ${{ env.REGION }}

      - name: Sign container with Cosign
        run: |
          gcloud artifacts docker images describe \
            us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }}@${{ steps.build.outputs.digest }} \
            --format="value(image_summary.digest)" > /dev/null

      - name: Create Cloud Deploy release (dev)
        id: deploy
        if: github.ref == 'refs/heads/develop'
        run: |
          RELEASE_NAME="dev-${GITHUB_SHA::8}-$(date +%s)"
          gcloud deploy releases create "$RELEASE_NAME" \
            --delivery-pipeline=yggdrasil-pipeline \
            --region=${{ env.REGION }} \
            --source=skaffold.yaml \
            --images=us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }}=${{ steps.build.outputs.digest }} \
            --annotations=git-commit=${{ github.sha }},git-ref=${{ github.ref_name }}
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Create Cloud Deploy release (prod - manual trigger only)
        id: deploy-prod
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        run: |
          RELEASE_NAME="prod-${GITHUB_SHA::8}-$(date +%s)"
          gcloud deploy releases create "$RELEASE_NAME" \
            --delivery-pipeline=yggdrasil-pipeline \
            --region=${{ env.REGION }} \
            --source=skaffold.yaml \
            --images=us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }}=${{ steps.build.outputs.digest }} \
            --annotations=git-commit=${{ github.sha }},git-ref=${{ github.ref_name }},deployed-by=${{ github.actor }}
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-and-sign
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_DEPLOYER_SA }}

      - name: Wait for dev rollout
        run: |
          echo "Waiting for dev deployment to complete..."
          gcloud deploy rollouts list \
            --delivery-pipeline=yggdrasil-pipeline \
            --release=${{ needs.build-and-sign.outputs.release-name }} \
            --region=${{ env.REGION }} \
            --filter="targetId:dev" \
            --format="value(name)" | head -1 | xargs -I {} gcloud deploy rollouts wait {} --region=${{ env.REGION }} --timeout=600s

      - name: Smoke test dev
        run: |
          URL="https://yggdrasil-web-dev.run.app"
          for i in {1..10}; do
            if curl -sf "$URL/api/health" | grep -q '"status":"ok"'; then
              echo "Dev smoke test passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Dev smoke test failed after 10 attempts"
          exit 1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-sign
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_DEPLOYER_SA }}

      - name: Wait for prod canary phases
        run: |
          echo "Waiting for production canary deployment..."
          for phase in canary-5 canary-25 canary-50 stable; do
            ROLLOUT=$(gcloud deploy rollouts list \
              --delivery-pipeline=yggdrasil-pipeline \
              --release=${{ needs.build-and-sign.outputs.release-name }} \
              --region=${{ env.REGION }} \
              --filter="targetId:prod AND phaseId:$phase" \
              --format="value(name)" | head -1)
            
            if [ -n "$ROLLOUT" ]; then
              echo "Waiting for phase: $phase"
              gcloud deploy rollouts wait "$ROLLOUT" --region=${{ env.REGION }} --timeout=1800s
              
              if [[ "$phase" != "stable" ]]; then
                echo "Verifying SLOs after $phase..."
                sleep 60
              fi
            fi
          done

      - name: Smoke test prod
        run: |
          URL="https://yggdrasil.app"
          for i in {1..10}; do
            if curl -sf "$URL/api/health" | grep -q '"status":"ok"'; then
              echo "Production smoke test passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Production smoke test failed after 10 attempts"
          exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Production Deployment Successful*"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {"type": "mrkdwn", "text": "Release: `${{ needs.build-and-sign.outputs.release-name }}`"},
                    {"type": "mrkdwn", "text": "SHA: `${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "Deployed by: `${{ github.actor }}`"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Production Deployment Failed*"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {"type": "mrkdwn", "text": "Release: `${{ needs.build-and-sign.outputs.release-name }}`"},
                    {"type": "mrkdwn", "text": "SHA: `${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "Deployed by: `${{ github.actor }}`"},
                    {"type": "mrkdwn", "text": "Check: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
