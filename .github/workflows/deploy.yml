name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: 'Git SHA to deploy (8 chars from build-and-sign job)'
        required: true
        type: string
      skip_canary:
        description: 'Skip canary and deploy 100% immediately (emergency)'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  REGION: 'us-central1'
  SHARED_PROJECT: 'yggdrasil-shared'
  ARTIFACT_REGISTRY: 'us-docker.pkg.dev/yggdrasil-shared/docker'
  SERVICE_NAME: 'yggdrasil-web'

jobs:
  validate:
    name: Validate Release Candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_DEPLOYER_SA }}

      - name: Verify image exists in Artifact Registry
        run: |
          DIGEST=$(gcloud artifacts docker images list \
            us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }} \
            --filter="tags:${{ github.event.inputs.release_sha }}" \
            --format="value(DIGEST)" | head -1)
          
          if [ -z "$DIGEST" ]; then
            echo "ERROR: No image found for SHA ${{ github.event.inputs.release_sha }}"
            echo "Available recent images:"
            gcloud artifacts docker images list \
              us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }} \
              --format="table(tags, DIGEST, updateTime.date('date_time'))" \
              --limit=10
            exit 1
          fi
          
          echo "Found image digest: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Verify Binary Authorization attestation
        run: |
          echo "Verifying Binary Authorization attestation..."
          gcloud container binauthz attestations list \
            --artifact-url="us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }}@${{ steps.validate.outputs.digest }}" \
            --attestor="projects/${{ env.SHARED_PROJECT }}/attestors/build-attestor" \
            --format="value(attestation)" | grep -q . || (echo "ERROR: No attestation found!" && exit 1)
          echo "Attestation verified!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_DEPLOYER_SA }}

      - name: Create production release
        id: release
        run: |
          RELEASE_NAME="prod-${{ github.event.inputs.release_sha }}-$(date +%s)"
          gcloud deploy releases create "$RELEASE_NAME" \
            --delivery-pipeline=yggdrasil-pipeline \
            --region=${{ env.REGION }} \
            --source=skaffold.yaml \
            --images=us-docker.pkg.dev/${{ env.SHARED_PROJECT }}/docker/${{ env.SERVICE_NAME }}=${{ needs.validate.outputs.digest }} \
            --annotations=git-commit=${{ github.event.inputs.release_sha }},deployed-by=${{ github.actor }}
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Wait for production canary rollout
        if: ${{ !github.event.inputs.skip_canary }}
        run: |
          echo "Waiting for production canary deployment..."
          for phase in canary-5 canary-25 canary-50 stable; do
            ROLLOUT=$(gcloud deploy rollouts list \
              --delivery-pipeline=yggdrasil-pipeline \
              --release=${{ steps.release.outputs.release_name }} \
              --region=${{ env.REGION }} \
              --filter="targetId:prod AND phaseId:$phase" \
              --format="value(name)" | head -1)
            
            if [ -n "$ROLLOUT" ]; then
              echo "Waiting for phase: $phase"
              gcloud deploy rollouts wait "$ROLLOUT" --region=${{ env.REGION }} --timeout=1800s
              
              if [[ "$phase" != "stable" ]]; then
                echo "Phase $phase complete, verifying..."
                sleep 60
              fi
            fi
          done
          echo "Production deployment complete!"

      - name: Emergency 100% deploy
        if: ${{ github.event.inputs.skip_canary }}
        run: |
          echo "Skipping canary, deploying 100% immediately..."
          gcloud deploy rollouts advance \
            --delivery-pipeline=yggdrasil-pipeline \
            --release=${{ steps.release.outputs.release_name }} \
            --region=${{ env.REGION }} \
            --phase-id=stable

      - name: Smoke test production
        run: |
          echo "Running production smoke tests..."
          URL="https://yggdrasil.app"
          for i in {1..10}; do
            if curl -sf "$URL/api/health" | grep -q '"status":"ok"'; then
              echo "Production smoke test passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Production smoke test failed after 10 attempts"
          exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Production Deployment Successful*"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {"type": "mrkdwn", "text": "Release: `${{ steps.release.outputs.release_name }}`"},
                    {"type": "mrkdwn", "text": "SHA: `${{ github.event.inputs.release_sha }}`"},
                    {"type": "mrkdwn", "text": "Deployed by: `${{ github.actor }}`"},
                    {"type": "mrkdwn", "text": "Canary: `${{ github.event.inputs.skip_canary == 'true' && 'SKIPPED (100%)' || '5%→25%→50%→100%' }}`"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Production Deployment Failed*"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {"type": "mrkdwn", "text": "Release: `${{ steps.release.outputs.release_name }}`"},
                    {"type": "mrkdwn", "text": "SHA: `${{ github.event.inputs.release_sha }}`"},
                    {"type": "mrkdwn", "text": "Deployed by: `${{ github.actor }}`"},
                    {"type": "mrkdwn", "text": "Check: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
